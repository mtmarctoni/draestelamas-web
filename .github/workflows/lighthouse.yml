name: Lighthouse

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          # Lighthouse validates the PRODUCTION config — SEO's is-crawlable
          # audit requires indexable pages. The real preview deploy is built
          # with PUBLIC_ALLOW_INDEXING=false in deploy-preview.yml.
          PUBLIC_ALLOW_INDEXING: "true"
          BASE_URL: https://draestelamas.com

      - name: Lighthouse CI (mobile emulation)
        run: npx --yes @lhci/cli@0.15.x autorun

      - name: Internal link check (non-blocking)
        uses: lycheeverse/lychee-action@v2.9.0
        with:
          # base must be the site docroot (dist/client) so root-relative links
          # like /es/ resolve to real files instead of reporting false 404s.
          args: --offline --base ./dist/client 'dist/client/**/*.html'
          fail: false
