name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Separate queues so a production deploy never cancels a staging deploy.
  group: deploy-${{ github.event_name == 'workflow_dispatch' && 'production' || 'staging' }}
  cancel-in-progress: false

jobs:
  staging:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://draestelamas.marctonimas.com
    environment:
      name: staging
      url: https://draestelamas.marctonimas.com
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Stamp build metadata
        id: meta
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Inject GitHub Variables
        env:
          VARS_CONTEXT: ${{ toJSON(vars) }}
        run: echo "$VARS_CONTEXT" | jq -r 'to_entries[] | "\(.key)=\(.value|@json)"' > .env
      - name: Build
        run: pnpm build
        env:
          CLOUDFLARE_ENV: staging
          # Canonical URLs, og:url, sitemap and robots.txt follow BASE_URL —
          # staging must not emit production-domain URLs.
          BASE_URL: ${{ env.SITE_URL }}
          PUBLIC_GIT_SHA: ${{ github.sha }}
          PUBLIC_BUILD_TIME: ${{ steps.meta.outputs.time }}
      - name: Deploy to staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # GitHub Variables become Worker `var` bindings, injected atomically
          # with the deploy (see scripts/deploy.sh). SECRETS_CONTEXT is only
          # used to skip any variable whose name collides with a secret.
          VARS_CONTEXT: ${{ toJSON(vars) }}
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}
        run: bash scripts/deploy.sh
      - name: Sync Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}
        run: bash scripts/sync-secrets.sh --env staging
      - name: Smoke test staging
        run: node scripts/smoke.mjs "$SITE_URL" "${{ github.sha }}"

  production:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://draestelamas.com
    environment:
      name: production
      url: https://draestelamas.com
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Stamp build metadata
        id: meta
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Inject GitHub Variables
        env:
          VARS_CONTEXT: ${{ toJSON(vars) }}
        run: echo "$VARS_CONTEXT" | jq -r 'to_entries[] | "\(.key)=\(.value|@json)"' > .env
      - name: Build
        run: pnpm build
        env:
          BASE_URL: ${{ env.SITE_URL }}
          PUBLIC_GIT_SHA: ${{ github.sha }}
          PUBLIC_BUILD_TIME: ${{ steps.meta.outputs.time }}
      - name: Deploy to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VARS_CONTEXT: ${{ toJSON(vars) }}
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}
        run: bash scripts/deploy.sh
      - name: Sync Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}
        run: bash scripts/sync-secrets.sh
      - name: Smoke test production
        run: node scripts/smoke.mjs "$SITE_URL" "${{ github.sha }}"
