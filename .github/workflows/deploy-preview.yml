name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    # Fork PRs cannot access secrets; skip them (they still get ci.yml + static Lighthouse).
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Stamp build metadata
        id: meta
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Build
        run: pnpm build
        env:
          PUBLIC_GIT_SHA: ${{ github.event.pull_request.head.sha }}
          PUBLIC_BUILD_TIME: ${{ steps.meta.outputs.time }}
      - name: Upload preview version
        id: preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler versions upload --env staging 2>&1 | tee upload.log
          url=$(grep -oiE 'https://[a-z0-9.-]+\.workers\.dev' upload.log | tail -1)
          if [ -z "$url" ]; then echo "no preview URL captured"; exit 1; fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - name: Smoke test preview
        run: node scripts/smoke.mjs "${{ steps.preview.outputs.url }}" "${{ github.event.pull_request.head.sha }}"
      - name: Lighthouse (real edge, informational)
        id: lh
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.preview.outputs.url }}/
            ${{ steps.preview.outputs.url }}/en/
          temporaryPublicStorage: true
          uploadArtifacts: true
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          LH_LINKS: ${{ steps.lh.outputs.links }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const links = process.env.LH_LINKS || "(lighthouse run skipped or failed)";
            const marker = "<!-- preview-bot -->";
            const body = [
              marker,
              "### Preview deployed",
              "",
              `- Preview: ${url}/`,
              `- Health: ${url}/health.json`,
              "",
              "<details><summary>Lighthouse (real edge)</summary>",
              "",
              "```",
              links,
              "```",
              "</details>",
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
