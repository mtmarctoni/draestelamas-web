name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    # Fork PRs cannot access secrets; skip them (they still get ci.yml + static
    # Lighthouse). Dependabot-triggered runs get Dependabot secrets, not repo
    # secrets, so the deploy would fail and the secret sync would see an empty
    # context — skip those too (pushing to a Dependabot branch yourself
    # re-triggers as your own actor and deploys normally).
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      # The account's workers.dev subdomain is stable; needed at BUILD time
      # (canonical URLs / sitemap / robots.txt), so it cannot be discovered
      # from the deploy output.
      PREVIEW_URL: https://draestelamas-preview.mtmarctoni.workers.dev
    environment:
      name: preview
      url: https://draestelamas-preview.mtmarctoni.workers.dev
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Stamp build metadata
        id: meta
        run: echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Inject GitHub Variables
        env:
          VARS_CONTEXT: ${{ toJSON(vars) }}
        run: echo "$VARS_CONTEXT" | jq -r 'to_entries[] | "\(.key)=\(.value|@json)"' > .env
      - name: Build
        run: pnpm build
        env:
          CLOUDFLARE_ENV: preview
          BASE_URL: ${{ env.PREVIEW_URL }}
          PUBLIC_GIT_SHA: ${{ github.event.pull_request.head.sha }}
          PUBLIC_BUILD_TIME: ${{ steps.meta.outputs.time }}
          PUBLIC_ALLOW_INDEXING: "false"
      - name: Deploy preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # GitHub Variables become Worker `var` bindings, injected atomically
          # with the deploy (see scripts/deploy.sh). SECRETS_CONTEXT is only
          # used to skip any variable whose name collides with a secret.
          VARS_CONTEXT: ${{ toJSON(vars) }}
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}
        run: bash scripts/deploy.sh
      - name: Sync Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRETS_CONTEXT: ${{ toJSON(secrets) }}
        run: bash scripts/sync-secrets.sh --env preview
      - name: Smoke test preview
        run: node scripts/smoke.mjs "$PREVIEW_URL" "${{ github.event.pull_request.head.sha }}"
        env:
          AUTH_USER: ${{ secrets.AUTH_USER }}
          AUTH_PASS: ${{ secrets.AUTH_PASS }}
      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const sha = process.env.COMMIT_SHA;
            const marker = "<!-- preview-bot -->";
            const body = [
              marker,
              "### Preview deployed",
              "",
              `- Preview: ${url}/`,
              `- Health: ${url}/api/health`,
              `- Commit: ${sha}`,
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
